
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; }

  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
  .header h2 { font-size: 15px; font-weight: 600; color: #111; }

  .legend { display: flex; gap: 12px; align-items: center; }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #888; }
  .leg-dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-active { background: #22c55e; box-shadow: 0 0 0 2px rgba(34,197,94,0.25); }
  .dot-done   { background: #94a3b8; }
  .dot-hold   { background: #e5e7eb; border: 1px solid #d1d5db; }

  .matrix-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1.45;
    background: #fafafa;
    border: 1px solid #e8e8e8;
    border-radius: 12px;
    overflow: hidden;
  }

  .quad {
    position: absolute;
    width: 50%; height: 50%;
    font-size: 10px; font-weight: 500;
    color: #d1d5db;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 10px 14px;
  }
  .q-tl { top:0; left:0; background: rgba(240,250,245,0.6); }
  .q-tr { top:0; right:0; background: rgba(238,244,255,0.6); }
  .q-bl { bottom:0; left:0; }
  .q-br { bottom:0; right:0; background: rgba(245,240,255,0.4); }

  .h-line { position:absolute; left:0; right:0; top:50%; height:1px; background:#e0e0e0; }
  .v-line { position:absolute; top:0; bottom:0; left:50%; width:1px; background:#e0e0e0; }
  .axis-x { position:absolute; bottom:7px; left:0; right:0; text-align:center; font-size:10px; color:#c0c0c0; }
  .axis-y-label {
    position:absolute; left:6px; top:50%;
    transform:translateY(-50%) rotate(-90deg);
    font-size:10px; color:#c0c0c0; white-space:nowrap;
  }

  .card {
    position: absolute;
    transform: translate(-50%, -50%);
    padding: 8px 11px;
    border-radius: 9px;
    cursor: pointer;
    transition: box-shadow 0.15s, transform 0.15s;
    border: 1.5px solid transparent;
    min-width: 108px;
    text-align: center;
    user-select: none;
    background: #fff;
  }
  .card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.1); transform: translate(-50%, -53%); }

  .card .title { font-size: 12px; font-weight: 600; }
  .card .desc  { font-size: 10px; margin-top: 2px; }

  /* 상태별 스타일 */
  .status-active {
    border-color: #22c55e !important;
    box-shadow: 0 0 0 3px rgba(34,197,94,0.12), 0 2px 8px rgba(34,197,94,0.15);
  }
  .status-active::after {
    content: '진행중';
    position: absolute;
    top: -9px; right: -4px;
    background: #22c55e;
    color: #fff;
    font-size: 9px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 20px;
    white-space: nowrap;
    letter-spacing: 0.02em;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 3px rgba(34,197,94,0.12), 0 2px 8px rgba(34,197,94,0.15); }
    50%      { box-shadow: 0 0 0 5px rgba(34,197,94,0.2),  0 2px 12px rgba(34,197,94,0.25); }
  }
  .status-active { animation: pulse 2.5s ease-in-out infinite; }

  .status-done {
    opacity: 0.45;
    filter: grayscale(0.5);
  }
  .status-done::after {
    content: '완료';
    position: absolute;
    top: -9px; right: -4px;
    background: #94a3b8;
    color: #fff;
    font-size: 9px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 20px;
  }

  /* 색상 테마 */
  .c-green  { border-color: #4caf8a; background: #f0faf5; }
  .c-green  .title { color: #1a7a52; } .c-green .desc { color: #4caf8a; }
  .c-blue   { border-color: #5b8dee; background: #eef4ff; }
  .c-blue   .title { color: #1a3e8c; } .c-blue  .desc { color: #5b8dee; }
  .c-amber  { border-color: #f0a530; background: #fff8ed; }
  .c-amber  .title { color: #8c5a00; } .c-amber .desc { color: #c97c10; }
  .c-purple { border-color: #9b72ef; background: #f5f0ff; }
  .c-purple .title { color: #4a1f9c; } .c-purple .desc { color: #8b5cf6; }
  .c-gray   { border-color: #ccc; background: #f7f7f7; }
  .c-gray   .title { color: #444; } .c-gray .desc { color: #999; }

  /* 진행중이면 색상 테마 강조 오버라이드 */
  .status-active.c-green  { background: #e8f8f0; }
  .status-active.c-blue   { background: #e4eeff; }
  .status-active.c-amber  { background: #fff3e0; }
  .status-active.c-purple { background: #ede8ff; }

  /* 하단 패널 */
  .panel {
    display: none; margin-top: 12px;
    background: #f9f9f9; border: 1px solid #eee;
    border-radius: 10px; padding: 14px 16px;
    position: relative;
  }
  .panel.show { display: block; }
  .panel .close { position:absolute; top:10px; right:14px; font-size:16px; cursor:pointer; color:#bbb; }
  .panel .ptitle { font-size:13px; font-weight:600; color:#111; }
  .panel .pdesc  { font-size:12px; color:#666; margin-top:5px; line-height:1.6; }
  .panel .pstatus { display:inline-block; font-size:10px; font-weight:600; padding:2px 8px; border-radius:20px; margin-top:8px; }
  .pstatus-active { background:#dcfce7; color:#15803d; }
  .pstatus-hold   { background:#f3f4f6; color:#6b7280; }
  .pstatus-done   { background:#e2e8f0; color:#475569; }
</style>
</head>
<body>

<div class="header">
  <h2>내부 업무 효율화 매트릭스</h2>
  <div class="legend">
    <div class="leg"><div class="leg-dot dot-active"></div>진행중</div>
    <div class="leg"><div class="leg-dot dot-hold"></div>대기</div>
    <div class="leg"><div class="leg-dot dot-done"></div>완료</div>
  </div>
</div>

<div class="matrix-wrap">
  <div class="quad q-tl">빠른 실행</div>
  <div class="quad q-tr" style="text-align:right">전략적 투자</div>
  <div class="quad q-bl">낮은 우선순위</div>
  <div class="quad q-br" style="text-align:right">장기 검토</div>
  <div class="h-line"></div>
  <div class="v-line"></div>
  <div class="axis-x">← 낮은 복잡도 &nbsp;&nbsp; 높은 복잡도 →</div>
  <div class="axis-y-label">↑ 높은 임팩트 &nbsp; 낮은 임팩트 ↓</div>

  <div class="card c-green status-active" style="left:22%;top:22%"
       onclick="show('슬랙 요약봇','n8n + Claude API로 채널 요약 후 아침 DM 자동 발송. 현재 파이프라인 설계 중.','active')">
    <div class="title">슬랙 요약봇</div>
    <div class="desc">즉시 시작 가능</div>
  </div>

  <div class="card c-green" style="left:34%;top:36%"
       onclick="show('주간보고 자동화','템플릿 표준화 + 데이터 자동 수집으로 4회 → 1회 목표.','hold')">
    <div class="title">주간보고 자동화</div>
    <div class="desc">4회 → 1회 목표</div>
  </div>

  <div class="card c-blue status-active" style="left:64%;top:20%"
       onclick="show('업무 대시보드 + agent','지표 추적·보고 공수 자동화. MTS 디지털팀 특성상 임팩트 명확. 현재 요구사항 정리 중.','active')">
    <div class="title">업무 대시보드</div>
    <div class="desc">+ 업무 agent</div>
  </div>

  <div class="card c-blue" style="left:78%;top:34%"
       onclick="show('마케팅 agent','A/B 테스트 설계·결과 분석 자동화. 실험 사이클 단축.','hold')">
    <div class="title">마케팅 agent</div>
    <div class="desc">A/B 테스트 효율화</div>
  </div>

  <div class="card c-amber" style="left:25%;top:66%"
       onclick="show('관리자페이지 개선','병목 포인트 파악이 먼저. UX 개선으로 퀵윈 전환 가능.','hold')">
    <div class="title">관리자페이지</div>
    <div class="desc">UX 개선</div>
  </div>

  <div class="card c-purple" style="left:70%;top:64%"
       onclick="show('QA agent','테스트 프로세스 전면 자동화. 설계 복잡도 높지만 장기 ROI 큼.','hold')">
    <div class="title">QA agent</div>
    <div class="desc">테스트 프로세스</div>
  </div>

  <div class="card c-gray status-done" style="left:20%;top:80%"
       onclick="show('agent 활용방안 공유','팀 내 AI 활용 역량 확산 세션 완료.','done')">
    <div class="title">agent 활용 공유</div>
    <div class="desc">팀 역량 확산</div>
  </div>
</div>

<div class="panel" id="panel">
  <span class="close" onclick="document.getElementById('panel').classList.remove('show')">×</span>
  <div class="ptitle" id="ptitle"></div>
  <div class="pdesc"  id="pdesc"></div>
  <div class="pstatus" id="pstatus"></div>
</div>

<script>
function show(title, desc, status) {
  document.getElementById('ptitle').textContent = title;
  document.getElementById('pdesc').textContent = desc;
  const el = document.getElementById('pstatus');
  const map = { active: ['진행중', 'pstatus-active'], hold: ['대기', 'pstatus-hold'], done: ['완료', 'pstatus-done'] };
  el.textContent = map[status][0];
  el.className = 'pstatus ' + map[status][1];
  document.getElementById('panel').classList.add('show');
}
</script>
</body>
</html>
