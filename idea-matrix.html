<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무 효율화 아이디어 매트릭스</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --bg2: #16161a;
    --bg3: #1e1e24;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --text: #e8e6e0;
    --text2: #8a8882;
    --text3: #5a5856;
    --accent-teal: #00c896;
    --accent-blue: #4d9fff;
    --accent-amber: #f5a623;
    --accent-purple: #9b7ff4;
    --accent-gray: #6b7280;
    --teal-dim: rgba(0,200,150,0.12);
    --blue-dim: rgba(77,159,255,0.12);
    --amber-dim: rgba(245,166,35,0.12);
    --purple-dim: rgba(155,127,244,0.12);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    min-height: 100vh;
    padding: 24px;
    overflow-x: hidden;
  }

  .header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 24px;
  }
  .header h1 {
    font-size: 16px;
    font-weight: 500;
    letter-spacing: -0.3px;
  }
  .header .mono {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text3);
  }

  /* 매트릭스 영역 */
  .matrix-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16/10;
    min-height: 380px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  /* 사분면 배경 */
  .quadrant {
    position: absolute;
    width: 50%; height: 50%;
    border: 0.5px solid var(--border);
    display: flex;
    align-items: flex-start;
    padding: 10px 12px;
  }
  .q-tl { top: 0; left: 0; border-top: none; border-left: none; }
  .q-tr { top: 0; right: 0; border-top: none; border-right: none; }
  .q-bl { bottom: 0; left: 0; border-bottom: none; border-left: none; }
  .q-br { bottom: 0; right: 0; border-bottom: none; border-right: none; }
  .q-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    pointer-events: none;
  }
  .q-tl .q-label { color: rgba(0,200,150,0.4); }
  .q-tr .q-label { color: rgba(77,159,255,0.4); }
  .q-bl .q-label { color: rgba(245,166,35,0.3); }
  .q-br .q-label { color: rgba(155,127,244,0.35); }

  /* 축 레이블 */
  .axis-x {
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: var(--text3);
    white-space: nowrap;
    font-family: 'IBM Plex Mono', monospace;
  }
  .axis-y {
    position: absolute;
    left: -56px;
    top: 50%;
    transform: translateY(-50%) rotate(-90deg);
    font-size: 10px;
    color: var(--text3);
    white-space: nowrap;
    font-family: 'IBM Plex Mono', monospace;
  }
  .axis-wrap {
    position: relative;
    width: 100%;
    margin-bottom: 32px;
    padding-left: 64px;
  }

  /* 노드 카드 */
  .node {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 10;
  }
  .node-inner {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    white-space: nowrap;
    transition: all 0.18s ease;
    position: relative;
    overflow: hidden;
  }
  .node-inner::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 8px 0 0 8px;
  }
  .node:hover .node-inner {
    border-color: var(--border-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .node.active .node-inner {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .node-title {
    font-size: 12px;
    font-weight: 500;
    line-height: 1.3;
  }
  .node-sub {
    font-size: 10px;
    color: var(--text2);
    margin-top: 2px;
    line-height: 1.3;
  }

  /* 색상 테마 */
  .teal .node-inner { border-color: rgba(0,200,150,0.3); background: rgba(0,200,150,0.07); }
  .teal .node-inner::before { background: var(--accent-teal); }
  .teal .node-title { color: #7de8c8; }
  .teal:hover .node-inner, .teal.active .node-inner { border-color: rgba(0,200,150,0.6); background: rgba(0,200,150,0.12); box-shadow: 0 8px 24px rgba(0,200,150,0.1); }

  .blue .node-inner { border-color: rgba(77,159,255,0.3); background: rgba(77,159,255,0.07); }
  .blue .node-inner::before { background: var(--accent-blue); }
  .blue .node-title { color: #7dbfff; }
  .blue:hover .node-inner, .blue.active .node-inner { border-color: rgba(77,159,255,0.6); background: rgba(77,159,255,0.12); box-shadow: 0 8px 24px rgba(77,159,255,0.1); }

  .amber .node-inner { border-color: rgba(245,166,35,0.3); background: rgba(245,166,35,0.07); }
  .amber .node-inner::before { background: var(--accent-amber); }
  .amber .node-title { color: #f5c96a; }
  .amber:hover .node-inner, .amber.active .node-inner { border-color: rgba(245,166,35,0.6); background: rgba(245,166,35,0.12); box-shadow: 0 8px 24px rgba(245,166,35,0.1); }

  .purple .node-inner { border-color: rgba(155,127,244,0.3); background: rgba(155,127,244,0.07); }
  .purple .node-inner::before { background: var(--accent-purple); }
  .purple .node-title { color: #bcaaff; }
  .purple:hover .node-inner, .purple.active .node-inner { border-color: rgba(155,127,244,0.6); background: rgba(155,127,244,0.12); box-shadow: 0 8px 24px rgba(155,127,244,0.1); }

  .gray .node-inner { border-color: rgba(107,114,128,0.3); background: rgba(107,114,128,0.07); }
  .gray .node-inner::before { background: var(--accent-gray); }
  .gray .node-title { color: #9ca3af; }
  .gray:hover .node-inner, .gray.active .node-inner { border-color: rgba(107,114,128,0.5); background: rgba(107,114,128,0.12); box-shadow: 0 8px 24px rgba(107,114,128,0.1); }

  /* 상세 패널 */
  .detail-panel {
    margin-top: 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    display: none;
    animation: slideUp 0.2s ease;
  }
  .detail-panel.visible { display: block; }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .detail-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .detail-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .detail-title { font-size: 14px; font-weight: 500; }
  .detail-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    margin-left: auto;
  }
  .detail-body { font-size: 12px; color: var(--text2); line-height: 1.8; }
  .detail-body strong { color: var(--text); font-weight: 500; }
  .detail-tags {
    display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px;
  }
  .tag {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--text3);
  }

  .close-btn {
    position: absolute;
    top: 14px; right: 16px;
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 16px; line-height: 1;
    padding: 2px 4px;
    transition: color 0.15s;
  }
  .close-btn:hover { color: var(--text); }
  .detail-panel { position: relative; }

  /* 범례 */
  .legend {
    display: flex; gap: 16px; flex-wrap: wrap;
    margin-top: 10px;
    padding-left: 64px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 10px; color: var(--text3);
    font-family: 'IBM Plex Mono', monospace;
  }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; }
</style>
</head>
<body>

<div class="header">
  <h1>업무 효율화 아이디어 매트릭스</h1>
  <span class="mono">— 클릭해서 상세 보기</span>
</div>

<div class="axis-wrap">
  <div class="matrix-wrap" id="matrix">

    <div class="quadrant q-tl"><span class="q-label">빠른 win</span></div>
    <div class="quadrant q-tr"><span class="q-label">전략적 투자</span></div>
    <div class="quadrant q-bl"><span class="q-label">검토 필요</span></div>
    <div class="quadrant q-br"><span class="q-label">장기 과제</span></div>

    <!-- 노드들 (left%, top% = 복잡도, 임팩트 반전) -->
    <!-- 슬랙 요약봇: 낮은복잡도(20%), 높은임팩트(25%) -->
    <div class="node teal" style="left:18%;top:22%" data-id="slack" onclick="showDetail('slack')">
      <div class="node-inner">
        <div class="node-title">슬랙 요약봇</div>
        <div class="node-sub">채널별 일간 요약</div>
      </div>
    </div>

    <!-- 주간보고 자동화: 낮은복잡도(28%), 높은임팩트(35%) -->
    <div class="node teal" style="left:30%;top:32%" data-id="report" onclick="showDetail('report')">
      <div class="node-inner">
        <div class="node-title">주간보고 자동화</div>
        <div class="node-sub">4회 → 1회 통합</div>
      </div>
    </div>

    <!-- 업무 대시보드+agent: 높은복잡도(68%), 높은임팩트(20%) -->
    <div class="node blue" style="left:68%;top:20%" data-id="dashboard" onclick="showDetail('dashboard')">
      <div class="node-inner">
        <div class="node-title">업무 대시보드 + agent</div>
        <div class="node-sub">자동 지표 집계·보고</div>
      </div>
    </div>

    <!-- 마케팅 agent: 높은복잡도(78%), 높은임팩트(38%) -->
    <div class="node blue" style="left:76%;top:32%" data-id="marketing" onclick="showDetail('marketing')">
      <div class="node-inner">
        <div class="node-title">마케팅 agent</div>
        <div class="node-sub">A/B 테스트 효율화</div>
      </div>
    </div>

    <!-- 관리자페이지: 낮은복잡도(22%), 낮은임팩트(68%) -->
    <div class="node amber" style="left:22%;top:66%" data-id="admin" onclick="showDetail('admin')">
      <div class="node-inner">
        <div class="node-title">관리자페이지 개선</div>
        <div class="node-sub">UX·프로세스 리팩터</div>
      </div>
    </div>

    <!-- QA agent: 높은복잡도(72%), 낮은임팩트(62%) -->
    <div class="node purple" style="left:70%;top:62%" data-id="qa" onclick="showDetail('qa')">
      <div class="node-inner">
        <div class="node-title">QA agent</div>
        <div class="node-sub">테스트 프로세스 자동화</div>
      </div>
    </div>

    <!-- agent 활용 공유: 낮은복잡도(16%), 낮은임팩트(80%) -->
    <div class="node gray" style="left:18%;top:78%" data-id="share" onclick="showDetail('share')">
      <div class="node-inner">
        <div class="node-title">agent 활용방안 공유</div>
        <div class="node-sub">팀 역량 확산 세션</div>
      </div>
    </div>

  </div>

  <div class="axis-y">임팩트 낮음 ← → 임팩트 높음</div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#00c896"></div> 빠른 win</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4d9fff"></div> 전략적 투자</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f5a623"></div> 검토 필요</div>
  <div class="legend-item"><div class="legend-dot" style="background:#9b7ff4"></div> 장기 과제</div>
  <div class="legend-item"><div class="legend-dot" style="background:#6b7280"></div> 기반 작업</div>
</div>

<div class="detail-panel" id="detail-panel">
  <button class="close-btn" onclick="closeDetail()">×</button>
  <div class="detail-top">
    <div class="detail-dot" id="d-dot"></div>
    <div class="detail-title" id="d-title"></div>
    <div class="detail-badge" id="d-badge"></div>
  </div>
  <div class="detail-body" id="d-body"></div>
  <div class="detail-tags" id="d-tags"></div>
</div>

    tags: ['팀 교육', '내부 공유', '문화 구축']
  }
};

let activeNode = null;

function showDetail(id) {
  const d = data[id];
  if (!d) return;

  // 이전 active 해제
  if (activeNode) {
    document.querySelector(`.node[data-id="${activeNode}"]`)?.classList.remove('active');
  }
  activeNode = id;
  document.querySelector(`.node[data-id="${id}"]`)?.classList.add('active');

  document.getElementById('d-dot').style.background = d.color;
  document.getElementById('d-title').textContent = d.title;
  const badge = document.getElementById('d-badge');
  badge.textContent = d.badge;
  badge.style.background = d.badgeBg;
  badge.style.color = d.badgeColor;
  document.getElementById('d-body').innerHTML = d.body;

  const tagsEl = document.getElementById('d-tags');
  tagsEl.innerHTML = d.tags.map(t => `<span class="tag">${t}</span>`).join('');

  const panel = document.getElementById('detail-panel');
  panel.classList.remove('visible');
  void panel.offsetWidth;
  panel.classList.add('visible');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('visible');
  if (activeNode) {
    document.querySelector(`.node[data-id="${activeNode}"]`)?.classList.remove('active');
    activeNode = null;
  }
}
</script>
</body>
