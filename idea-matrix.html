<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>임팩트 × 복잡도 매트릭스</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --border: #e8e6e1;
    --border-strong: #d4d0c8;
    --text: #1c1b18;
    --text-2: #6b6860;
    --text-3: #a8a49c;
    --now-border: #86efac;
    --now-text: #15803d;
    --now-badge: #dcfce7;
    --later-border: #fde047;
    --later-text: #854d0e;
    --later-badge: #fef9c3;
    --idea-badge: #f1f0ee;
    --idea-text: #6b6860;
    --high-dot: #ef4444;
    --mid-dot: #f59e0b;
    --low-dot: #94a3b8;
    --axis-label: #9c9890;
  }

  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    line-height: 1.5;
    padding: 20px;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 10px;
  }
  .title { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  .subtitle { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .legend { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-2); }
  .leg-dot { width: 7px; height: 7px; border-radius: 50%; }
  .leg-box { width: 10px; height: 10px; border-radius: 2px; }

  .filters { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .filter-btn {
    padding: 4px 11px; border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-size: 11px; font-weight: 500;
    color: var(--text-2); cursor: pointer;
    transition: all 0.12s; font-family: inherit;
  }
  .filter-btn:hover { border-color: var(--text-3); color: var(--text); }
  .filter-btn.active { background: var(--text); border-color: var(--text); color: #fff; }

  .matrix-wrap {
    position: relative;
    display: grid;
    grid-template-columns: 26px 1fr;
    grid-template-rows: 1fr 26px;
    height: 560px;
  }
  .y-axis {
    grid-row: 1; grid-column: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .y-axis-label {
    font-size: 9px; color: var(--axis-label);
    writing-mode: vertical-rl; text-orientation: mixed;
    transform: rotate(180deg); letter-spacing: 0.05em; font-weight: 500;
  }
  .x-axis {
    grid-row: 2; grid-column: 2;
    display: flex; align-items: center; justify-content: center;
  }
  .x-axis-label { font-size: 9px; color: var(--axis-label); letter-spacing: 0.05em; font-weight: 500; }

  .matrix {
    grid-row: 1; grid-column: 2;
    position: relative;
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    background: var(--surface);
    overflow: hidden;
  }

  .quad {
    position: absolute; width: 50%; height: 50%;
    display: flex; align-items: flex-start; padding: 9px 11px;
  }
  .quad-label { font-size: 9px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; opacity: 0.45; }
  .q-tl { top:0; left:0; background: rgba(240,253,244,0.6); }
  .q-tl .quad-label { color: #15803d; }
  .q-tr { top:0; right:0; background: rgba(239,246,255,0.5); }
  .q-tr .quad-label { color: #1d4ed8; }
  .q-bl { bottom:0; left:0; }
  .q-bl .quad-label { color: var(--text-3); align-self: flex-end; }
  .q-br { bottom:0; right:0; background: rgba(254,252,232,0.5); }
  .q-br .quad-label { color: #92400e; align-self: flex-end; }

  .h-div { position:absolute; left:0; right:0; top:50%; height:1px; background:var(--border); z-index:1; }
  .v-div { position:absolute; top:0; bottom:0; left:50%; width:1px; background:var(--border); z-index:1; }

  .card {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 10;
    transition: transform 0.15s;
  }
  .card:hover { transform: translate(-50%, -54%); z-index: 50; }
  .card.hidden { display: none; }

  .card-inner {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 6px 9px;
    min-width: 96px;
    max-width: 136px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    transition: box-shadow 0.15s;
  }
  .card:hover .card-inner { box-shadow: 0 6px 22px rgba(0,0,0,0.13); }

  .card-name { font-size: 11px; font-weight: 600; color: var(--text); line-height: 1.3; margin-bottom: 4px; }
  .card-tags { display: flex; gap: 3px; flex-wrap: wrap; }
  .tag { font-size: 9px; font-weight: 500; padding: 1px 5px; border-radius: 10px; }
  .tag-now   { background: var(--now-badge);   color: var(--now-text); }
  .tag-later { background: var(--later-badge); color: var(--later-text); }
  .tag-idea  { background: var(--idea-badge);  color: var(--idea-text); }
  .impact-dot { display:inline-block; width:5px; height:5px; border-radius:50%; margin-right:2px; vertical-align:middle; }
  .dot-high { background: var(--high-dot); }
  .dot-mid  { background: var(--mid-dot); }
  .dot-low  { background: var(--low-dot); }

  .card-now   .card-inner { border-color: var(--now-border); }
  .card-later .card-inner { border-color: var(--later-border); }

  @keyframes pulse-now {
    0%,100% { box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 0 0 0 rgba(134,239,172,0.5); }
    50%      { box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 0 0 5px rgba(134,239,172,0.08); }
  }
  .card-now .card-inner { animation: pulse-now 3s ease-in-out infinite; }
  .card-now:hover .card-inner { animation: none; }

  .panel {
    display: none; margin-top: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; position: relative;
  }
  .panel.show { display: block; }
  .panel-close { position:absolute; top:10px; right:14px; font-size:16px; cursor:pointer; color:var(--text-3); background:none; border:none; font-family:inherit; }
  .panel-close:hover { color: var(--text); }
  .panel-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .panel-body { font-size: 12px; color: var(--text-2); line-height: 1.75; white-space: pre-wrap; }
  .panel-meta { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .meta-chip { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 20px; border: 1px solid var(--border); color: var(--text-2); }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="title">임팩트 × 복잡도 매트릭스</div>
    <div class="subtitle">SQ10 아이디어 백로그 · 카드 클릭 시 상세 내용 표시</div>
  </div>
  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:var(--high-dot)"></div>높은 임팩트</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--mid-dot)"></div>중간 임팩트</div>
    <div class="leg-item"><div class="leg-box" style="background:var(--now-badge);border:1.5px solid var(--now-border)"></div>NOW</div>
    <div class="leg-item"><div class="leg-box" style="background:var(--later-badge);border:1.5px solid var(--later-border)"></div>LATER</div>
  </div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
  <button class="filter-btn" onclick="setFilter('NOW',this)">🔥 NOW</button>
  <button class="filter-btn" onclick="setFilter('LATER',this)">⏳ LATER</button>
  <button class="filter-btn" onclick="setFilter('아이디어',this)">💡 아이디어</button>
  <button class="filter-btn" onclick="setFilter('high',this)">높은 임팩트만</button>
</div>

<div class="matrix-wrap">
  <div class="y-axis">
    <div class="y-axis-label">↑ 높은 임팩트 &nbsp;&nbsp;&nbsp; 낮은 임팩트 ↓</div>
  </div>
  <div class="matrix" id="matrix">
    <div class="quad q-tl"><span class="quad-label">빠른 실행</span></div>
    <div class="quad q-tr"><span class="quad-label">전략적 투자</span></div>
    <div class="quad q-bl"><span class="quad-label">낮은 우선순위</span></div>
    <div class="quad q-br"><span class="quad-label">장기 검토</span></div>
    <div class="h-div"></div>
    <div class="v-div"></div>
  </div>
  <div class="x-axis">
    <div class="x-axis-label">← 낮은 복잡도 &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 높은 복잡도 →</div>
  </div>
</div>

<div class="panel" id="panel">
  <button class="panel-close" onclick="document.getElementById('panel').classList.remove('show')">×</button>
  <div class="panel-name" id="p-name"></div>
  <div class="panel-body" id="p-body"></div>
  <div class="panel-meta" id="p-meta"></div>
</div>

<script>
const items = [
  // ── 좌상단 (낮은복잡도 × 높은임팩트) : 빠른 실행 ──
  { name:'슬랙 요약봇',         status:'NOW',    impact:'높음', complexity:'낮음', x:12, y:12,
    body:'가설: 주요 채널의 일주일치 대화를 GPT API로 자동 요약해서 매주 금요일 채널에 게시하면, 팀원들이 슬랙에서 정보 파악에 쓰는 시간이 절반 이하로 줄어들 것이다.\n\n• 채널별 주요 논의/결정사항/액션아이템 구조화 전달 → 정보 파악 시간 50% 단축\n• 반복 질문 감소 → 슬랙 내 중복 소통 축소\n• 스프린트 리뷰/회고 시 참고자료로 활용', category:'자동화' },
  { name:'주간보고 자동화',     status:'NOW',    impact:'높음', complexity:'낮음', x:30, y:20,
    body:'보고 템플릿 표준화 + 데이터 자동 수집으로 주간보고 4회 → 1회 목표.', category:'자동화' },

  // ── 좌하단 (낮은복잡도 × 낮은임팩트) : 낮은 우선순위 ──
  { name:'회의록 자동화',       status:'NOW',    impact:'중간', complexity:'낮음', x:12, y:60,
    body:'Slack 허들 녹취 → 요약 + 액션아이템 자동 추출. 회의록 작성 시간 0에 수렴.', category:'자동화' },
  { name:'공시/규제 모니터링', status:'LATER',  impact:'중간', complexity:'낮음', x:30, y:75,
    body:'금융위/KRX RSS 읽어서 MTS 관련 키워드 슬랙 자동 발송. 법적 리스크 관리 연결.', category:'자동화' },

  // ── 우상단 (높은복잡도 × 높은임팩트) : 전략적 투자 ──
  { name:'SQL 저장소',          status:'NOW',    impact:'높음', complexity:'중간', x:54, y:10,
    body:'가설: 분석가들이 검증된 쿼리를 태그/검색으로 즉시 재사용할 수 있으면, 기존 쿼리 재작성에 쓰는 시간(업무시간의 ~30%)이 절반 이하로 줄어들 것이다.\n\n• 쿼리 재사용률 증가 → 분석가 인당 주 3~4시간 절감\n• 중앙 저장소 누적 → 퇴사/이동 시 노하우 소실 방지\n• 신규 분석가 온보딩 기간 50% 단축 목표', category:'Product 개발' },
  { name:'Figma MCP → React',   status:'NOW',    impact:'높음', complexity:'중간', x:68, y:18,
    body:'Figma MCP 서버로 디자인 화면을 AI에 읽히면, 디자인 토큰 + 기존 퍼블리셔 컴포넌트 기반으로 피그마와 동일한 React 페이지를 자동 생성할 수 있다.\n\n성공 시 디자인→퍼블리싱 리드타임 50% 이상 단축 기대.', category:'Product 개발' },
  { name:'실험설계서 자동 draft', status:'NOW',  impact:'높음', complexity:'중간', x:57, y:29,
    body:'씨앗 두 줄 입력 → 1-1, 2-1, 2-2, 2-3 자동 draft. 실험 착수 시간 50% 단축.', category:'실험 설계' },
  { name:'GA 쿼리 모듈 인프라', status:'NOW',   impact:'높음', complexity:'중간', x:72, y:36,
    body:'스쿼드별 GA 데이터 추출 쿼리 모듈화. 실험 프로세스 병목 1단계 해소.', category:'인프라' },
  { name:'업무 대시보드 + agent', status:'LATER', impact:'높음', complexity:'높음', x:82, y:12,
    body:'스쿼드별 실험 현황 실시간 파악. 주간 보고 준비 시간 70% 단축.', category:'Product 개발' },
  { name:'가상 A/B 테스트 agent', status:'LATER', impact:'높음', complexity:'높음', x:90, y:28,
    body:'피그마 화면 + GA 기반 페르소나로 실험 전 초기 필터링. 실험 실패 비용 절감.', category:'실험 설계' },

  // ── 우하단 (높은복잡도 × 낮은임팩트) : 장기 검토 ──
  { name:'관리자페이지 UX 개선',     status:'LATER',   impact:'중간', complexity:'중간', x:54, y:60,
    body:'내부 관리자 페이지 병목 포인트 파악 후 UX 개선. 퀵윈 전환 가능성 검토.', category:'프로세스 개선' },
  { name:'마케팅 (배너 관리)',        status:'NOW',     impact:'높음', complexity:'높음', x:84, y:42,
    body:'내부 관리자 페이지 병목 포인트 파악 후 UX 개선. 퀵윈 전환 가능성 검토.', category:'자동화' },
  { name:'스프린트 리뷰 자동 draft', status:'LATER',   impact:'중간', complexity:'중간', x:64, y:70,
    body:'실험 결과 + 백로그 진행 상황 자동 취합 → 리뷰 자료 초안 생성.', category:'프로세스 개선' },
  { name:'마케팅 (이벤트 신청)',      status:'아이디어', impact:'중간', complexity:'높음', x:76, y:60,
    body:'이벤트 업로드 및 신청 자동 연동, 반복 운영 업무 70% 감소.', category:'자동화' },
  { name:'실험 프로세스 개선',       status:'아이디어', impact:'중간', complexity:'높음', x:76, y:76,
    body:'실험 프로세스 전반에 걸친 개선 아이디어. 구체화 필요.', category:'실험 설계' },
  { name:'마케팅 (사후처리)',         status:'아이디어', impact:'높음', complexity:'높음', x:88, y:54,
    body:'당첨자 추첨, 결과 리포트, 발송 추적 자동화. 이벤트당 사후처리 시간 50% 단축.', category:'자동화' },
  { name:'QA agent / 테스트 프로세스', status:'LATER', impact:'중간', complexity:'높음', x:88, y:68,
    body:'PR 리뷰 보조, 배포 체크리스트 자동화. 테스트 프로세스 전면 자동화.', category:'Product 개발' },
];

function dotClass(i){ return i==='높음'?'dot-high':i==='중간'?'dot-mid':'dot-low'; }
function tagClass(s){ return s==='NOW'?'tag-now':s==='LATER'?'tag-later':'tag-idea'; }
function cardClass(s){ return s==='NOW'?'card-now':s==='LATER'?'card-later':''; }

const matrix = document.getElementById('matrix');
items.forEach(item => {
  const d = document.createElement('div');
  d.className = `card ${cardClass(item.status)}`;
  d.dataset.status = item.status;
  d.dataset.impact = item.impact;
  d.style.left = item.x + '%';
  d.style.top  = item.y + '%';
  d.innerHTML = `<div class="card-inner">
    <div class="card-name">${item.name}</div>
    <div class="card-tags">
      <span class="tag ${tagClass(item.status)}">${item.status}</span>
      <span class="tag tag-idea"><span class="impact-dot ${dotClass(item.impact)}"></span>${item.impact}</span>
    </div>
  </div>`;
  d.onclick = () => {
    document.getElementById('p-name').textContent = item.name;
    document.getElementById('p-body').textContent = item.body;
    document.getElementById('p-meta').innerHTML =
      `<span class="meta-chip">상태: ${item.status}</span>
       <span class="meta-chip">임팩트: ${item.impact}</span>
       <span class="meta-chip">복잡도: ${item.complexity}</span>
       <span class="meta-chip">카테고리: ${item.category}</span>`;
    const p = document.getElementById('panel');
    p.classList.add('show');
    p.scrollIntoView({ behavior:'smooth', block:'nearest' });
  };
  matrix.appendChild(d);
});

function setFilter(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.card').forEach(c => {
    const s = c.dataset.status, i = c.dataset.impact;
    let show = type === 'all'
      || (type === 'NOW' && s === 'NOW')
      || (type === 'LATER' && s === 'LATER')
      || (type === '아이디어' && s === '아이디어')
      || (type === 'high' && i === '높음');
    c.classList.toggle('hidden', !show);
  });
}
</script>
</body>
</html>
